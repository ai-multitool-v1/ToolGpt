<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolGpt — Sign in</title>
  <meta name="description" content="ToolGpt — Pentesting, ethical hacking & cybersecurity assistant." />

  <!-- Fonts: Inter (UI) + JetBrains Mono (code/labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/theme.css" />

  <!-- Favicon: terminal-style "T" mark -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2300ff9c'/%3E%3Cpath d='M8 11h6v10H8z' fill='none'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='16' font-weight='700' text-anchor='middle' fill='%23001a10'%3ET%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card" role="main" aria-label="Authentication">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 7 8 11 4 15"></polyline>
            <line x1="12" y1="16" x2="20" y2="16"></line>
          </svg>
        </div>
        <span class="auth-logo-name">ToolGpt</span>
      </div>
      <p class="auth-tagline">// Pentesting · Ethical Hacking · Cybersecurity</p>

      <!-- Tabs -->
      <div class="auth-tabs" role="tablist">
        <button id="tab-login"   class="auth-tab active" role="tab" aria-selected="true">Login</button>
        <button id="tab-signup"  class="auth-tab"        role="tab" aria-selected="false">Sign Up</button>
        <button id="tab-forgot"  class="auth-tab"        role="tab" aria-selected="false">Forgot</button>
      </div>

      <!-- ===== LOGIN FORM ===== -->
      <form id="form-login" class="auth-form" autocomplete="on" novalidate>
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>
        <div class="auth-field">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="••••••••••" required minlength="8" />
        </div>
        <div class="auth-actions">
          <button id="btn-login" type="submit" class="btn btn-primary">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
              <polyline points="10 17 15 12 10 7"></polyline>
              <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            Sign in
          </button>
          <button id="btn-google" type="button" class="btn btn-google">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/>
            </svg>
            Continue with Google
          </button>
        </div>
      </form>

      <!-- ===== SIGNUP FORM ===== -->
      <form id="form-signup" class="auth-form hidden" autocomplete="on" novalidate>
        <div class="auth-field">
          <label for="signup-username">Username <span style="color:var(--text-dim)">(optional)</span></label>
          <input id="signup-username" name="username" type="text" autocomplete="username" placeholder="anonymous_h4x0r" />
        </div>
        <div class="auth-field">
          <label for="signup-email">Email</label>
          <input id="signup-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>
        <div class="auth-field">
          <label for="signup-password">Password <span style="color:var(--text-dim)">(min 8 chars)</span></label>
          <input id="signup-password" name="password" type="password" autocomplete="new-password" placeholder="••••••••••" required minlength="8" />
        </div>
        <div class="auth-actions">
          <button id="btn-signup" type="submit" class="btn btn-primary">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="8.5" cy="7" r="4"></circle>
              <line x1="20" y1="8" x2="20" y2="14"></line>
              <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
            Create account
          </button>
          <button id="btn-google" type="button" class="btn btn-google" form="form-signup">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/>
            </svg>
            Continue with Google
          </button>
        </div>
      </form>

      <!-- ===== FORGOT FORM ===== -->
      <form id="form-forgot" class="auth-form hidden" autocomplete="on" novalidate>
        <div class="auth-field">
          <label for="forgot-email">Email</label>
          <input id="forgot-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>
        <div class="auth-actions">
          <button id="btn-forgot" type="submit" class="btn btn-primary">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            Send reset link
          </button>
        </div>
      </form>

      <!-- Status / error message -->
      <div id="auth-message" class="auth-message info" role="status" aria-live="polite" hidden></div>

      <p class="auth-footer">
        Authorized use only · <kbd>Enter</kbd> to submit
      </p>
    </section>
  </main>

  <!--
    Bootstrap the auth controller.
    supabase-client.js self-initialises on import (sets up the global `supabase`
    and syncs the access-token cookie on every auth state change).
    auth.js exposes initAuthPage() which wires all the IDs above.
  -->
  <script type="module">
    import '/js/supabase-client.js';
    import { initAuthPage } from '/js/auth.js';
    initAuthPage();
  </script>
</body>
</html>
